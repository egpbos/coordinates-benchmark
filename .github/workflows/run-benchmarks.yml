# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Run benchmarks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        # Non declared build dependencies
        python -m pip install Cython numpy
        # Tools to benchmark
        python -m pip install -r requirements.txt
        # Prefetch as workaround for https://github.com/skyfielders/python-skyfield/issues/262
        wget -c "$(python -c 'from coordinates_benchmark.tools.skyfield import EPHEMERIS; print(EPHEMERIS)')"

    # the following 3 CASA preparation steps adopted from https://github.com/r-xue/pipeline/blob/7b6ed11fe0d40a1e5a88cbbd8166bccb64cf8e3d/.github/workflows/env-setup-run-template.yml#L85-L105
    - name: Setup CASA environment
      run: |
        mkdir -p ~/.casa
        mkdir -p casarundata
        # Configure CASA datapath in ~/.casa/config.py
        # We use double quotes so the shell expands $HOME and $GITHUB_WORKSPACE
        echo "measurespath = '$GITHUB_WORKSPACE/casarundata'" >> ~/.casa/config.py
        echo "datapath = [ '$GITHUB_WORKSPACE/casarundata', ]" >> ~/.casa/config.py
        echo "measures_auto_update = True" >> ~/.casa/config.py
        echo "data_auto_update = True" >> ~/.casa/config.py

    - name: Cache casarundata
      uses: actions/cache@v5
      with:
        path: casarundata
        key: casarundata

    - name: Get casarundata
      run: |
        # Trigger casatools import to fetch or update casarundata under $GITHUB_WORKSPACE/casarundata.
        # This may download or update measurement sets and related runtime data; fail explicitly if it does not succeed.
        python -c "import casatools" || { echo 'casatools import failed; casarundata may be incomplete.' >&2; exit 1; }

    - name: Run benchmarks
      run: |
        ./make.py --help
        ./make.py tool-info

        ./make.py make_observer_table
        ./make.py make_skycoord_table
        ./make.py benchmark-celestial
        ./make.py benchmark-horizontal
        ./make.py summary-celestial

        # Making all plots is slow, but this is run rarely enough that it's fine to just do them all. However,
        # if you are debugging, you could instead add the --tools=astropy flag to generate just some of the
        # plots.
        ./make.py plots
  
    - name: Upload static files as artifact
      id: deployment
      uses: actions/upload-pages-artifact@v5
      with:
        path: output/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [benchmark]
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
    - name: Deploy results
      id: deployment
      uses: actions/deploy-pages@v5